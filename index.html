<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="The GitHub Pages user site for the mahmadnet GitHub account.">
    <title>mahmadnet.github.io</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <div class="site-shell">
      <header class="site-header">
        <p class="site-name">mahmadnet.github.io</p>
      </header>

      <main class="hero">
        <div class="hero-content">
          <h1>A home for projects<br>on GitHub Pages.</h1>
          <p class="hero-copy">
            This user site provides the root namespace for approved project
            sites published by the mahmadnet GitHub account.
          </p>
          <a class="profile-link" href="https://github.com/mahmadnet">
            <span>View mahmadnet on GitHub</span>
            <svg aria-hidden="true" viewBox="0 0 24 24" width="24" height="24">
              <path d="M5 12h14M13 6l6 6-6 6"></path>
            </svg>
          </a>
        </div>

        <div class="blueprint" aria-hidden="true">
          <span class="blueprint-grid"></span>
          <span class="blueprint-guide blueprint-guide-horizontal"></span>
          <span class="blueprint-guide blueprint-guide-vertical"></span>
          <span class="blueprint-cube">
            <span class="cube-face cube-front"></span>
            <span class="cube-face cube-top"></span>
            <span class="cube-face cube-side"></span>
          </span>
          <span class="blueprint-slash blueprint-slash-upper"></span>
          <span class="blueprint-slash blueprint-slash-lower"></span>
          <span class="blueprint-mark mark-top-left"></span>
          <span class="blueprint-mark mark-top-right"></span>
          <span class="blueprint-mark mark-bottom-left"></span>
          <span class="blueprint-mark mark-bottom-right"></span>
        </div>
      </main>

      <footer class="site-footer"><p>Published with GitHub Pages.</p></footer>
    </div>
  </body>
</html>
