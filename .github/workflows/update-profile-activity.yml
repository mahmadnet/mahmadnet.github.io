name: Update profile activity

on:
  schedule:
    - cron: "17 4 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: profile-activity-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4
      - name: Run updater tests
        run: python3 -m unittest discover -s tests
      - name: Refresh public profile data
        run: python3 scripts/update_profile.py
      - name: Validate generated changes
        run: git diff --check
      - name: Commit a changed snapshot
        shell: bash
        run: |
          if git diff --quiet -- index.html; then
            echo "Profile data is already current."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "chore: refresh profile activity"
          git push
